    <style>
        :root { 
            --gold: #ffcc00; 
            --violet: #d400ff; 
            --bg: rgba(15, 15, 15, 0.95); 
            --win-green: #00ff88; 
            --loss-red: #ff4d4d;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .drag-box { 
            position: fixed; 
            z-index: 10000; 
            background: var(--bg); 
            border: 1px solid rgba(255, 204, 0, 0.4); 
            border-radius: 16px; 
            padding: 12px; 
            text-align: center; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            touch-action: none; 
            width: 150px;
        }

        #c-panel { top: 50px; right: 15px; }
        
        #c-panel.minimized { 
            width: 50px !important; height: 50px !important; border-radius: 50%; padding: 0; 
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, var(--gold), #ff9900); cursor: pointer;
        }
        #c-panel.minimized * { display: none !important; }
        #c-panel.minimized::after { content: "AG"; color: #000; font-size: 24px; font-weight: 900; }

        .header { font-size: 10px; font-weight: 900; color: var(--gold); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 8px; }
        
        .res-display { font-size: 16px; font-weight: 900; margin: 5px 0; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        
        .percent-badge {
            background: rgba(255, 204, 0, 0.15);
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 8px;
            border: 0.5px solid var(--gold);
        }

        .update-anim { animation: pulse 0.5s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .btn { 
            width: 100%; padding: 8px; margin-top: 6px; background: transparent; 
            border: 1px solid var(--violet); color: #fff; cursor: pointer; 
            font-size: 10px; border-radius: 8px; font-weight: bold; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: var(--violet); }

        input { 
            width: 85%; padding: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--gold); color: #fff; border-radius: 6px; font-size: 10px; text-align: center;
        }

        #result-popup {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20000; padding: 20px 60px; border-radius: 50px;
            font-size: 40px; font-weight: 900; display: none; text-align: center;
        }

        #history-box { top: 200px; left: 10px; width: 200px; display: none; border-color: var(--violet); }
        .log-list { max-height: 160px; overflow-y: auto; font-size: 10px; color: #fff; }
        .log-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .nav-holder { display: flex; justify-content: center; margin-top: 10px; }
        .nav-btn { background: #222; border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 9px; cursor: pointer; }

        .screen { display: none; }
        .active { display: block; }
    </style>
